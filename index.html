async function initSupabaseStore() {
  const seeded = ensureEnhancedData(defaultData);
  if (!isSupabaseConfigured()) {
    onlineDataCache = seeded;
    return { configured: false, seeded: false };
  }
  if (!window.supabase?.createClient) {
    onlineDataCache = seeded;
    throw new Error('Supabase client library did not load.');
  }
  supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
  });
  const { data, error } = await supabaseClient
    .from(SUPABASE_TABLE)
    .select('data')
    .eq('id', SUPABASE_RECORD_ID)
    .maybeSingle();
  if (error) throw error;
  if (data?.data) {
    onlineDataCache = ensureEnhancedData(data.data);
    return { configured: true, seeded: false };
  }
  onlineDataCache = seeded;
  const { error: insertError } = await supabaseClient
    .from(SUPABASE_TABLE)
    .insert({ id: SUPABASE_RECORD_ID, data: onlineDataCache });
  if (insertError) throw insertError;
  return { configured: true, seeded: true };
}

async function persistSupabaseData(data) {
  if (!isSupabaseConfigured() || !supabaseClient) return;
  const { error } = await supabaseClient
    .from(SUPABASE_TABLE)
    .upsert({ id: SUPABASE_RECORD_ID, data, updated_at: new Date().toISOString() });
  if (error) {
    console.error('Supabase save failed', error);
    showToast('Online database save failed', 'error');
  }
}

function ensureEnhancedData(data) {
  const merged = { ...data };
  Object.entries(ENHANCED_COLLECTION_DEFAULTS).forEach(([key, value]) => {
    if (!Array.isArray(merged[key])) merged[key] = value;
  });
  if (Array.isArray(merged.projects)) {
    merged.projects = merged.projects.map(project => ({
      drawings: [],
      calculations: [],
      sitePhotos: [],
      inspectionReports: [],
      clientDocuments: [],
      ...project
    }));
  }
  if (Array.isArray(merged.users)) {
    merged.users = merged.users.map(user => ({ avatar: null, approvalRights: [], ...user }));
  }
  if (!merged.settings || typeof merged.settings !== 'object') merged.settings = {};
  if (!Array.isArray(merged.phaseApprovals)) merged.phaseApprovals = [];
  if (!Array.isArray(merged.testForms)) merged.testForms = [];
  if (!Array.isArray(merged.boms)) merged.boms = [];
  return merged;
}

function formatBytes(bytes = 0) {
  if (!bytes) return '0 KB';
  const units = ['B', 'KB', 'MB', 'GB'];
  const index = Math.min(Math.floor(Math.log(bytes) / Math.log(1024)), units.length - 1);
  return `${(bytes / Math.pow(1024, index)).toFixed(index ? 1 : 0)} ${units[index]}`;
}

async function readUserPhotoInput(inputId = 'userPhoto') {
  const input = document.getElementById(inputId);
  const file = input?.files?.[0];
  if (!file) return null;
  const extension = (file.name.split('.').pop() || '').toLowerCase();
  if (!['jpg', 'jpeg', 'png', 'webp'].includes(extension)) {
    showToast('User image must be JPG, PNG, or WEBP', 'error');
    return false;
  }
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = () => resolve({
      id: generateId('avatar'),
      name: file.name,
      type: file.type || 'image/*',
      extension,
      size: file.size,
      dataUrl: reader.result,
      uploadedAt: new Date().toISOString()
    });
    reader.readAsDataURL(file);
  });
}

function projectOptions(selected = '') {
  const data = getData();
  return data.projects.map(project => `<option value="${project.id}" ${selected === project.id ? 'selected' : ''}>${escapeHtml(project.name)}</option>`).join('');
}

function readSelectedFiles(inputId, allowedExtensions) {
  const input = document.getElementById(inputId);
  const files = Array.from(input?.files || []);
  const allowed = allowedExtensions.map(ext => ext.toLowerCase());
  const invalid = files.filter(file => !allowed.includes((file.name.split('.').pop() || '').toLowerCase()));
  if (invalid.length) {
    showToast(`Unsupported file: ${invalid[0].name}`, 'error');
    return Promise.resolve(null);
  }
  return Promise.all(files.map(file => new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = () => resolve({
      id: generateId('file'),
      name: file.name,
      type: file.type || 'application/octet-stream',
      extension: (file.name.split('.').pop() || '').toLowerCase(),
      size: file.size,
      dataUrl: reader.result,
      uploadedAt: new Date().toISOString()
    });
    reader.readAsDataURL(file);
  })));
}

function downloadStoredFile(fileId) {
  const data = getData();
  const pools = [
    ...data.designFiles,
    ...(data.projectBudgets || []).flatMap(budget => budget.files || []),
    ...(data.testForms || []).flatMap(form => form.files || []),
    ...data.siteReports.flatMap(report => [...(report.photos || []), ...(report.pdfs || [])]),
    ...data.inventions.flatMap(item => [...(item.documents || []), ...(item.photos || []), ...(item.drawings || [])])
  ];
  const file = pools.find(item => item.id === fileId);
  if (!file?.dataUrl) return showToast('File is not available for download', 'error');
  const a = document.createElement('a');
  a.href = file.dataUrl;
  a.download = file.name;
  a.click();
}

function approveProjectBudget(budgetId) {
  const data = getData();
  if (!canApprovePhase(data.currentUser)) {
    showToast('You do not have approval rights for project phase approvals.', 'error');
    return;
  }
  const budget = (data.projectBudgets || []).find(item => item.id === budgetId);
  if (!budget) return showToast('Budget not found', 'error');
  const updatedBudgets = (data.projectBudgets || []).map(item => item.id === budgetId ? {
    ...item,
    approvalStatus: 'approved',
    approvedBy: data.currentUser.id,
    approvedByName: data.currentUser.name,
    approvedAt: new Date().toISOString()
  } : item);
  saveData({ projectBudgets: updatedBudgets });
  logActivity(data.currentUser.id, data.currentUser.name, 'approve', 'project-budget', budget.projectId, `Approved budget for ${projectName(budget.projectId)}`);
  showToast('Budget approved', 'success');
  render();
}

function renderFabrication() {
  const data = getData();
  const jobs = data.fabricationJobs || [];
  const view = window.fabGanttView || 'weekly';
  const expanded = window.fabExpanded || {};

  // Date range for Gantt
  const allDates = jobs.flatMap(j => [
    new Date(j.startDate), new Date(j.endDate),
    ...(j.operations || []).flatMap(o => [new Date(o.startDate), new Date(o.endDate)])
  ]).filter(d => !isNaN(d));
  let minDate = allDates.length ? new Date(Math.min(...allDates)) : new Date();
  let maxDate = allDates.length ? new Date(Math.max(...allDates)) : new Date();
  minDate.setDate(minDate.getDate() - 3);
  maxDate.setDate(maxDate.getDate() + 7);
  const totalMs = maxDate - minDate;
  const totalDays = totalMs / (1000 * 60 * 60 * 24);
  const today = new Date();
  const todayPct = today >= minDate && today <= maxDate ? ((today - minDate) / totalMs) * 100 : null;

  function getPos(start, end) {
    const s = new Date(start);
    const e = new Date(end);
    const startPct = ((s - minDate) / totalMs) * 100;
    const widthPct = ((e - s) / totalMs) * 100;
    return { startPct: Math.max(0, startPct), widthPct: Math.max(1, widthPct) };
  }

  const statusColors = {
    'Planned': 'bg-slate-400',
    'In Production': 'bg-blue-500',
    'Quality Check': 'bg-amber-500',
    'Completed': 'bg-green-500'
  };

  // Build header cells
  let headerCells = '';
  let current = new Date(minDate);
  if (view === 'weekly') {
    while (current <= maxDate) {
      const dayStart = new Date(current);
      const dayEnd = new Date(current);
      dayEnd.setDate(dayEnd.getDate() + 1);
      const end = dayEnd > maxDate ? maxDate : dayEnd;
      const startPct = ((dayStart - minDate) / totalMs) * 100;
      const widthPct = ((end - dayStart) / totalMs) * 100;
      const label = dayStart.toLocaleDateString('en-US', { weekday: 'short', day: 'numeric' });
      const isWeekend = dayStart.getDay() === 0 || dayStart.getDay() === 6;
      headerCells += `<div class="absolute top-0 h-full border-r border-slate-200 text-[10px] font-medium text-slate-400 flex items-center justify-center ${isWeekend ? 'bg-slate-50' : ''}" style="left: ${startPct}%; width: ${widthPct}%">${label}</div>`;
      current.setDate(current.getDate() + 1);
    }
  } else {
    while (current <= maxDate) {
      const monthStart = new Date(current);
      const monthEnd = new Date(current.getFullYear(), current.getMonth() + 1, 1);
      const end = monthEnd > maxDate ? maxDate : monthEnd;
      const startPct = ((monthStart - minDate) / totalMs) * 100;
      const widthPct = ((end - monthStart) / totalMs) * 100;
      headerCells += `<div class="absolute top-0 h-full border-r border-slate-200 text-xs font-medium text-slate-400 flex items-center px-2" style="left: ${startPct}%; width: ${widthPct}%">${monthStart.toLocaleDateString('en-US', { month: 'short', year: 'numeric' })}</div>`;
      current = monthEnd;
    }
  }

  function renderBar(item, isOp, jobId) {
    const pos = getPos(item.startDate, item.endDate);
    const color = statusColors[item.status] || 'bg-blue-500';
    const height = isOp ? 'h-6' : 'h-8';
    const label = isOp ? item.name : item.name;
    const onclick = `openFabEditModal('${jobId}', '${item.id}')`;
    return `
      <div class="absolute top-1 bottom-1 rounded-md ${color} opacity-90 cursor-pointer hover:opacity-100 hover:shadow-md transition-all ${height}" style="left: ${pos.startPct}%; width: ${pos.widthPct}%; min-width: 4px;" onclick="${onclick}" title="${escapeHtml(label)} — ${item.startDate} to ${item.endDate} (${item.status})">
        <div class="h-full flex items-center px-2">
          <span class="text-[10px] text-white font-medium truncate">${escapeHtml(label)}</span>
        </div>
      </div>
    `;
  }

  let rows = '';
  jobs.forEach(job => {
    const pos = getPos(job.startDate, job.endDate);
    const isExpanded = expanded[job.id];
    rows += `
      <div class="relative flex items-center border-b border-slate-100 hover:bg-slate-50">
        <div class="w-64 shrink-0 px-3 py-2 border-r border-slate-100 flex items-center gap-2">
          <button onclick="toggleFabExpand('${job.id}')" class="text-slate-400 hover:text-slate-600 w-5">
            <i class="fa-solid ${isExpanded ? 'fa-chevron-down' : 'fa-chevron-right'}"></i>
          </button>
          <div class="min-w-0">
            <p class="text-sm font-semibold text-slate-900 truncate">${escapeHtml(job.name)}</p>
            <p class="text-[10px] text-slate-400">${escapeHtml(projectName(job.projectId))}</p>
          </div>
        </div>
        <div class="w-28 shrink-0 px-2 py-2 border-r border-slate-100 text-[11px] text-slate-500">${job.startDate || '—'}</div>
        <div class="w-28 shrink-0 px-2 py-2 border-r border-slate-100 text-[11px] text-slate-500">${job.endDate || '—'}</div>
        <div class="flex-1 relative h-10 bg-slate-100/50">
          ${renderBar(job, false, job.id)}
        </div>
        <div class="w-10 shrink-0 flex items-center justify-center">
          <button onclick="deleteFabricationJob('${job.id}')" class="text-slate-300 hover:text-red-500"><i class="fa-solid fa-trash text-xs"></i></button>
        </div>
      </div>
    `;
    if (isExpanded && job.operations) {
      job.operations.forEach(op => {
        rows += `
          <div class="relative flex items-center border-b border-slate-50 hover:bg-slate-50">
            <div class="w-64 shrink-0 px-3 py-1.5 border-r border-slate-100 pl-10">
              <p class="text-xs text-slate-600 truncate">${escapeHtml(op.name)}</p>
              <p class="text-[10px] text-slate-400">${escapeHtml(op.assignee || '—')}</p>
            </div>
            <div class="w-28 shrink-0 px-2 py-1.5 border-r border-slate-100 text-[11px] text-slate-400">${op.startDate || '—'}</div>
            <div class="w-28 shrink-0 px-2 py-1.5 border-r border-slate-100 text-[11px] text-slate-400">${op.endDate || '—'}</div>
            <div class="flex-1 relative h-8 bg-slate-100/30">
              ${renderBar(op, true, job.id)}
            </div>
            <div class="w-10 shrink-0"></div>
          </div>
        `;
      });
      rows += `
        <div class="relative flex items-center border-b border-slate-50">
          <div class="w-64 shrink-0 px-3 py-1 pl-10">
            <button onclick="openFabAddOpModal('${job.id}')" class="text-[11px] text-blue-600 hover:text-blue-700 font-medium"><i class="fa-solid fa-plus mr-1"></i>Add Operation</button>
          </div>
          <div class="w-28 shrink-0"></div>
          <div class="w-28 shrink-0"></div>
          <div class="flex-1"></div>
          <div class="w-10 shrink-0"></div>
        </div>
      `;
    }
  });

  return `
    <div class="space-y-6">
      ${renderPageHeader('Fabrication', 'Track fabrication jobs, welding reports, quality checks, progress, certificates, materials, labour hours, and costs.', 'fa-industry')}

      <!-- Stats -->
      <div class="grid gap-4 md:grid-cols-4">

function saveFabricationJob() {
  const data = getData();
  const job = {
    id: generateId('fab'),
    name: document.getElementById('fabName').value || 'Fabrication Job',
    projectId: document.getElementById('fabProject').value,
    status: document.getElementById('fabStatus').value,
    startDate: document.getElementById('fabStartDate').value || new Date().toISOString().slice(0, 10),
    endDate: document.getElementById('fabEndDate').value || new Date().toISOString().slice(0, 10),
    materials: document.getElementById('fabMaterials').value,
    labourHours: Number(document.getElementById('fabLabour').value || 0),
    cost: Number(document.getElementById('fabCost').value || 0),
    notes: document.getElementById('fabNotes').value,
    progress: 0,
    operations: [],
    createdAt: new Date().toISOString()
  };
  saveData({ fabricationJobs: [job, ...data.fabricationJobs] });
  logActivity(data.currentUser.id, data.currentUser.name, 'create', 'fabrication-job', job.id, `Created fabrication job: ${job.name}`);
  showToast('Fabrication job saved', 'success');
  render();
}

function deleteFabricationJob(jobId) {
  if (!confirm('Delete this fabrication job and all its operations?')) return;
  const data = getData();
  const job = data.fabricationJobs.find(j => j.id === jobId);
  saveData({ fabricationJobs: data.fabricationJobs.filter(j => j.id !== jobId) });
  if (job) logActivity(data.currentUser.id, data.currentUser.name, 'delete', 'fabrication-job', jobId, `Deleted fabrication job: ${job.name}`);
  showToast('Job deleted', 'success');
  render();
}

function saveFabEdit(jobId, opId) {
  const data = getData();
  const jobs = data.fabricationJobs.map(j => {
    if (j.id !== jobId) return j;
    const isOp = opId && opId !== jobId;
    if (isOp) {
      return {
        ...j,
        operations: j.operations.map(o => {
          if (o.id !== opId) return o;
          return {
            ...o,
            name: document.getElementById('fabEditName').value || o.name,
            assignee: document.getElementById('fabEditAssignee')?.value || o.assignee,
            startDate: document.getElementById('fabEditStart').value,
            endDate: document.getElementById('fabEditEnd').value,
            status: document.getElementById('fabEditStatus').value,
            progress: Number(document.getElementById('fabEditProgress').value || 0)
          };
        })
      };
    }
    return {
      ...j,
      name: document.getElementById('fabEditName').value || j.name,
      projectId: document.getElementById('fabEditProject').value,
      startDate: document.getElementById('fabEditStart').value,
      endDate: document.getElementById('fabEditEnd').value,
      status: document.getElementById('fabEditStatus').value,
      progress: Number(document.getElementById('fabEditProgress').value || 0),
      labourHours: Number(document.getElementById('fabEditLabour').value || 0),
      cost: Number(document.getElementById('fabEditCost').value || 0),
      materials: document.getElementById('fabEditMaterials').value,
      notes: document.getElementById('fabEditNotes').value
    };
  });
  saveData({ fabricationJobs: jobs });
  showToast('Saved successfully', 'success');
  closeFabEditModal();
  render();
}

        </div>

      </div>
      <div class="grid gap-4 md:grid-cols-4">${metrics.map((metric, index) => `<div class="bg-white rounded-xl border border-slate-200 p-5"><p class="text-xs text-slate-400">${metric}</p><p class="text-2xl font-bold">${records.length ? Math.round(records.reduce((sum, item) => sum + Number(item.metrics?.[index] || 0), 0) / records.length) : 0}</p></div>`).join('')}</div>
      ${records.length === 0 ? renderEmptyState('No records yet.') : records.map(record => `<div class="bg-white rounded-xl border border-slate-200 p-5"><div class="flex justify-between"><h3 class="font-semibold">${escapeHtml(record.name)}</h3><span class="text-xs px-2 py-1 bg-blue-50 text-blue-700 rounded-full">${escapeHtml(record.category)}</span></div><p class="text-sm text-slate-500 mt-1">${escapeHtml(record.notes)}</p><p class="text-xs text-slate-400 mt-3">${escapeHtml(record.status)} - ${escapeHtml(projectName(record.projectId))}</p></div>`).join('')}
    </div>
  `;
}

async function saveInvention() {
  const files = await readSelectedFiles('invFiles', ['dwg', 'dxf', 'pdf', 'jpg', 'jpeg', 'png', 'webp']);

  const drawings = (files || []).filter(file => ['dwg', 'dxf'].includes(file.extension));
  const photos = (files || []).filter(file => ['jpg', 'jpeg', 'png', 'webp'].includes(file.extension));
  const documents = (files || []).filter(file => file.extension === 'pdf');
  const data = getData();
  const item = { id: generateId('inv'), title: document.getElementById('invTitle').value || 'Untitled Invention', description: document.getElementById('invDescription').value, inventor: document.getElementById('invInventor').value, category: document.getElementById('invCategory').value, status: document.getElementById('invStatus').value, patentStatus: document.getElementById('invPatent').value, prototypeStatus: document.getElementById('invPrototype').value, investmentCost: Number(document.getElementById('invInvestment').value || 0), revenuePotential: Number(document.getElementById('invRevenue').value || 0), documents, photos, drawings, createdAt: new Date().toISOString() };
  saveData({ inventions: [item, ...data.inventions] });
  logActivity(data.currentUser.id, data.currentUser.name, 'create', 'invention', item.id, `Created invention: ${item.title}`);

  render();
}

function getData() {
  if (!onlineDataCache) onlineDataCache = ensureEnhancedData(defaultData);
  return onlineDataCache;
}

function saveData(partial) {
  const current = getData();
  const updated = ensureEnhancedData({ ...current, ...partial });
  onlineDataCache = updated;
  persistSupabaseData(updated);
  return updated;
}

function logActivity(userId, userName, action, entityType, entityId, details) {
  const data = getData();
  const log = { id: `log-${Date.now()}-${Math.random().toString(36).substr(2,9)}`, userId, userName, action, entityType, entityId, details, timestamp: new Date().toISOString() };
  data.activityLogs.unshift(log);
  if (data.activityLogs.length > 500) data.activityLogs = data.activityLogs.slice(0, 500);
  saveData({ activityLogs: data.activityLogs });
}

function generateId(prefix) { return `${prefix}-${Date.now()}-${Math.random().toString(36).substr(2,9)}`; }

function showToast(message, type = 'info') {
  const toast = document.createElement('div');
  toast.className = `toast fixed top-4 right-4 z-50 px-4 py-3 rounded-lg shadow-lg text-white text-sm font-medium ${type === 'error' ? 'bg-red-500' : type === 'success' ? 'bg-green-500' : 'bg-blue-500'}`;
  toast.textContent = message;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

function attachLoginListeners() {
  const form = document.getElementById('loginForm');
  if (!form) return;
  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    const data = getData();
    const user = data.users.find(u => u.email === email && u.password === password && u.status === 'active');
    if (!user) {
      document.getElementById('loginError').textContent = 'Invalid credentials or account inactive';
      document.getElementById('loginError').classList.remove('hidden');
      return;
    }
    const updatedUser = { ...user, lastLogin: new Date().toISOString(), loginCount: user.loginCount + 1 };
    const updatedUsers = data.users.map(u => u.id === user.id ? updatedUser : u);
    saveData({ currentUser: updatedUser, users: updatedUsers });
    logActivity(user.id, user.name, 'login', 'user', user.id, 'User logged in');
    setState({ page: 'dashboard', currentUser: updatedUser });
  });

  document.getElementById('togglePassword')?.addEventListener('click', () => {
    const input = document.getElementById('loginPassword');
    input.type = input.type === 'password' ? 'text' : 'password';
  });
}

function renderDashboard() {
  const data = getData();
  const projects = data.projects;
  const users = data.users;
  const logs = data.activityLogs.slice(0, 10);

  const stats = {
    total: projects.length,
    active: projects.filter(p => p.status === 'in-progress').length,
    completed: projects.filter(p => p.status === 'completed').length,
    users: users.filter(u => u.status === 'active').length,
    avgProgress: projects.length > 0 ? Math.round(projects.reduce((a, b) => a + b.progress, 0) / projects.length) : 0,
    highPriority: projects.filter(p => p.priority === 'critical' || p.priority === 'high').length
  };

  const statusColors = { 'design-stage': 'bg-cyan-500', approval: 'bg-amber-500', planning: 'bg-yellow-500', 'in-progress': 'bg-blue-500', testing: 'bg-purple-500', completed: 'bg-green-500', 'on-hold': 'bg-gray-500' };

  // Gantt chart
  const dates = projects.flatMap(p => [new Date(p.startDate), new Date(p.endDate)]);
  const minDate = new Date(Math.min(...dates.map(d => d.getTime())));
  const maxDate = new Date(Math.max(...dates.map(d => d.getTime())));
  minDate.setDate(minDate.getDate() - 7);
  maxDate.setDate(maxDate.getDate() + 7);
  const totalDays = (maxDate - minDate) / (1000 * 60 * 60 * 24);
  const today = new Date();

function renderMonthHeaders(minDate, maxDate) {
  let html = '';
  let current = new Date(minDate);
  while (current < maxDate) {
    const monthStart = new Date(current);
    const monthEnd = new Date(current.getFullYear(), current.getMonth() + 1, 1);
    const end = monthEnd > maxDate ? maxDate : monthEnd;
    const startPct = ((monthStart - minDate) / (maxDate - minDate)) * 100;
    const widthPct = ((end - monthStart) / (maxDate - minDate)) * 100;
    html += `<div class="absolute top-0 h-full border-r border-slate-200 text-xs font-medium text-slate-400 flex items-center px-2" style="left: ${startPct}%; width: ${widthPct}%">${monthStart.toLocaleDateString('en-US', { month: 'short', year: 'numeric' })}</div>`;
    current = monthEnd;
  }
  return html;
}

    document.getElementById('projName').value = p.name;
    document.getElementById('projDesc').value = p.description;
    document.getElementById('projStatus').value = p.status;
    document.getElementById('projPriority').value = p.priority;
    document.getElementById('projProgress').value = p.progress;
    document.getElementById('progVal').textContent = p.progress;
    document.getElementById('projStart').value = p.startDate;
    document.getElementById('projEnd').value = p.endDate;
    document.getElementById('projCategory').value = p.productCategory;
  } else {
    title.textContent = 'New Project';
    document.getElementById('projName').value = '';
    document.getElementById('projDesc').value = '';
    document.getElementById('projStatus').value = 'design-stage';
    document.getElementById('projPriority').value = 'medium';
    document.getElementById('projProgress').value = 0;
    document.getElementById('progVal').textContent = '0';
    document.getElementById('projStart').value = '';
    document.getElementById('projEnd').value = '';
    document.getElementById('projCategory').value = '';
  }
}

function closeProjectModal() {
  document.getElementById('projectModal').classList.add('hidden');
  document.getElementById('projectModal').classList.remove('flex');
  editingProjectId = null;
}

function saveProject() {
  const data = getData();
  const currentUser = data.currentUser;
  const project = {
    name: document.getElementById('projName').value,
    description: document.getElementById('projDesc').value,
    status: document.getElementById('projStatus').value,
    priority: document.getElementById('projPriority').value,
    progress: parseInt(document.getElementById('projProgress').value),
    startDate: document.getElementById('projStart').value,
    endDate: document.getElementById('projEnd').value,
    productCategory: document.getElementById('projCategory').value,
  };

  const existingProject = editingProjectId ? data.projects.find(p => p.id === editingProjectId) : null;

  if (project.status === 'planning' && editingProjectId && existingProject?.status !== 'planning' && existingProject?.status !== 'approval') {
    showToast('Move the project to Approval before moving it to Planning.', 'error');
    return;
  }

  if (project.status === 'planning' && editingProjectId && existingProject?.status !== 'planning' && !canApprovePhase(currentUser)) {
    showToast('You do not have approval rights to move this project to Planning.', 'error');
    return;
  }

  if (project.status === 'planning' && editingProjectId && !hasApprovedBudget(editingProjectId)) {
    showToast('An authorized user must approve an uploaded Approved Budget before moving to Planning.', 'error');
    navigate('projectBudgets');
    return;
  }

  if (project.status === 'testing' && editingProjectId && existingProject?.status !== 'testing' && !hasUploadedTestForms(editingProjectId)) {
    showToast('Upload the required testing forms before moving this project to Testing.', 'error');
    navigate('testingForms');
    return;
  }

  if (project.status === 'planning' && !editingProjectId) {
    showToast('Create the project first, upload an Approved Budget, then move it to Planning.', 'error');
    return;
  }

  if (editingProjectId) {
    const approvedBudget = getApprovedBudget(editingProjectId);
    const newPhaseApproval = project.status === 'planning' && existingProject?.status !== 'planning' ? {
      id: generateId('approval'),
      projectId: editingProjectId,
      phase: 'design-to-planning',
      fromStatus: existingProject?.status || null,
      toStatus: 'planning',
      approvedBudgetId: approvedBudget?.id || null,
      approvedBy: currentUser.id,
      approvedByName: currentUser.name,
      approvedAt: new Date().toISOString()
    } : null;
    const updated = data.projects.map(p => p.id === editingProjectId ? { ...p, ...project, updatedAt: new Date().toISOString() } : p);
    saveData({ projects: updated, phaseApprovals: newPhaseApproval ? [newPhaseApproval, ...(data.phaseApprovals || [])] : (data.phaseApprovals || []) });
    if (newPhaseApproval) {
      logActivity(currentUser.id, currentUser.name, 'approve', 'project-phase', editingProjectId, `Approved ${project.name} from Design/Approval to Planning using approved budget`);
    }
    logActivity(currentUser.id, currentUser.name, 'update', 'project', editingProjectId, `Updated project: ${project.name}`);
    showToast('Project updated!', 'success');
  } else {
    const newProject = {
      id: generateId('proj'),
      ...project,
      assigneeIds: [], teamIds: [], createdBy: currentUser.id,
      createdAt: new Date().toISOString(), updatedAt: new Date().toISOString(),
      comments: [], updates: []
    };
    saveData({ projects: [...data.projects, newProject] });
    logActivity(currentUser.id, currentUser.name, 'create', 'project', newProject.id, `Created project: ${project.name}`);
    showToast('Project created!', 'success');
  }
  closeProjectModal();
  render();
}

function editProject(id) { openProjectModal(id); }

function deleteProject(id) {
  const data = getData();
  const p = data.projects.find(x => x.id === id);
  if (!confirm(`Delete "${p.name}"?`)) return;
  const updated = data.projects.filter(x => x.id !== id);
  saveData({ projects: updated });
  logActivity(data.currentUser.id, data.currentUser.name, 'delete', 'project', id, `Deleted project: ${p.name}`);
  showToast('Project deleted', 'success');
  render();
}

function addCheck(projectId) {
  const data = getData();
  const p = data.projects.find(x => x.id === projectId);
  const update = { id: generateId('update'), userId: data.currentUser.id, userName: data.currentUser.name, text: `Status check: ${p.status} at ${p.progress}%`, type: 'check', createdAt: new Date().toISOString() };
  const updated = data.projects.map(x => x.id === projectId ? { ...x, updates: [...x.updates, update], updatedAt: new Date().toISOString() } : x);
  saveData({ projects: updated });
  logActivity(data.currentUser.id, data.currentUser.name, 'check', 'project', projectId, `Checked status: ${p.name}`);

function openCommentModal(projectId) {
  commentingProjectId = projectId;
  const modal = document.getElementById('commentModal');
  modal.classList.remove('hidden');
  modal.classList.add('flex');
  document.getElementById('commentText').value = '';
}

function closeCommentModal() {
  document.getElementById('commentModal').classList.add('hidden');
  document.getElementById('commentModal').classList.remove('flex');
  commentingProjectId = null;
}

function saveComment() {
  const text = document.getElementById('commentText').value.trim();

  const updated = data.projects.map(p => p.id === commentingProjectId ? { ...p, comments: [...p.comments, comment], updatedAt: new Date().toISOString() } : p);

function exportProjectsPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const data = getData();
  doc.setFontSize(18); doc.text('Projects Report', 14, 20);
  doc.setFontSize(10); doc.text('Generated: ' + new Date().toLocaleString(), 14, 28);
  const tableData = data.projects.map(p => [p.name, p.status, p.priority, p.progress + '%', p.startDate, p.endDate, p.productCategory]);
  doc.autoTable({ head: [['Name', 'Status', 'Priority', 'Progress', 'Start', 'End', 'Category']], body: tableData, startY: 35, styles: { fontSize: 9 }, headStyles: { fillColor: [37, 99, 235] } });
  doc.save('projects-report.pdf');
  showToast('PDF exported!', 'success');
}

function exportProjectsExcel() {
  const data = getData();
  const exportData = data.projects.map(p => ({ Name: p.name, Description: p.description, Status: p.status, Priority: p.priority, Progress: p.progress + '%', 'Start Date': p.startDate, 'End Date': p.endDate, Category: p.productCategory }));
  const ws = XLSX.utils.json_to_sheet(exportData);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Projects');
  XLSX.writeFile(wb, 'projects.xlsx');
  showToast('Excel exported!', 'success');
}

let editingUserId = null;
let editingTeamId = null;
let passwordUserId = null;

function openUserModal(userId = null) {
  editingUserId = userId;
  const modal = document.getElementById('userModal');
  modal.classList.remove('hidden'); modal.classList.add('flex');
  document.getElementById('userModalTitle').textContent = userId ? 'Edit User' : 'Add User';
  if (userId) {
    const data = getData();
    const u = data.users.find(x => x.id === userId);
    document.getElementById('userName').value = u.name;
    document.getElementById('userEmail').value = u.email;
    document.getElementById('userPassword').value = '';
    document.getElementById('userRole').value = u.role;
    document.getElementById('userTeam').value = u.teamId || '';
    document.getElementById('userStatus').value = u.status;
    document.getElementById('approvalDesignPlanning').checked = (u.approvalRights || []).includes('design-to-planning');
    document.getElementById('userPhotoPreview').innerHTML = u.avatar?.dataUrl ? `<img src="${u.avatar.dataUrl}" alt="${u.name}" class="h-full w-full object-cover">` : '<i class="fa-solid fa-user"></i>';
  } else {
    document.getElementById('userName').value = '';
    document.getElementById('userEmail').value = '';
    document.getElementById('userPassword').value = '';
    document.getElementById('userRole').value = 'engineer';
    document.getElementById('userTeam').value = '';
    document.getElementById('userStatus').value = 'active';
    document.getElementById('approvalDesignPlanning').checked = false;
    document.getElementById('userPhotoPreview').innerHTML = '<i class="fa-solid fa-user"></i>';
  }
  document.getElementById('userPhoto')?.addEventListener('change', async () => {
    const photo = await readUserPhotoInput('userPhoto');
    if (!photo) return;
    document.getElementById('userPhotoPreview').innerHTML = `<img src="${photo.dataUrl}" alt="Selected user image" class="h-full w-full object-cover">`;
  });
}

function closeUserModal() { document.getElementById('userModal').classList.add('hidden'); document.getElementById('userModal').classList.remove('flex'); editingUserId = null; }

async function saveUser() {
  const data = getData();
  const selectedPhoto = await readUserPhotoInput('userPhoto');
  if (selectedPhoto === false) return;
  const user = {
    name: document.getElementById('userName').value,
    email: document.getElementById('userEmail').value,
    role: document.getElementById('userRole').value,
    teamId: document.getElementById('userTeam').value || null,
    status: document.getElementById('userStatus').value,
    approvalRights: document.getElementById('approvalDesignPlanning').checked ? ['design-to-planning'] : [],
  };
  if (editingUserId) {
    const updated = data.users.map(u => u.id === editingUserId ? { ...u, ...user, avatar: selectedPhoto || u.avatar || null, password: document.getElementById('userPassword').value || u.password } : u);
    const updatedCurrentUser = data.currentUser?.id === editingUserId ? updated.find(u => u.id === editingUserId) : data.currentUser;
    saveData({ users: updated, currentUser: updatedCurrentUser });
    logActivity(data.currentUser.id, data.currentUser.name, 'update', 'user', editingUserId, `Updated user: ${user.name}`);
    showToast('User updated!', 'success');
  } else {
    const newUser = { id: generateId('user'), ...user, avatar: selectedPhoto || null, password: document.getElementById('userPassword').value, createdAt: new Date().toISOString(), lastLogin: null, loginCount: 0 };
    saveData({ users: [...data.users, newUser] });
    logActivity(data.currentUser.id, data.currentUser.name, 'create', 'user', newUser.id, `Created user: ${user.name}`);
    showToast('User created!', 'success');
  }
  closeUserModal(); render();
}

function editUser(id) { openUserModal(id); }
function deleteUser(id) {
  const data = getData();
  if (id === data.currentUser.id) { showToast('Cannot delete yourself!', 'error'); return; }
  const u = data.users.find(x => x.id === id);
  if (!confirm(`Delete user "${u.name}"?`)) return;
  const updated = data.users.filter(x => x.id !== id);
  saveData({ users: updated });
  logActivity(data.currentUser.id, data.currentUser.name, 'delete', 'user', id, `Deleted user: ${u.name}`);
  showToast('User deleted', 'success'); render();
}

function openPasswordModal(userId) {
  passwordUserId = userId;
  const modal = document.getElementById('passwordModal');
  modal.classList.remove('hidden'); modal.classList.add('flex');
  document.getElementById('newPassword').value = '';
}
function closePasswordModal() { document.getElementById('passwordModal').classList.add('hidden'); document.getElementById('passwordModal').classList.remove('flex'); passwordUserId = null; }
function savePassword() {
  const pwd = document.getElementById('newPassword').value;
  if (!pwd || !passwordUserId) return;
  const data = getData();
  const updated = data.users.map(u => u.id === passwordUserId ? { ...u, password: pwd } : u);
  saveData({ users: updated });
  logActivity(data.currentUser.id, data.currentUser.name, 'update', 'user', passwordUserId, 'Changed password');
  showToast('Password updated!', 'success');
  closePasswordModal(); render();
}

function openTeamModal(teamId = null) {
  editingTeamId = teamId;
  const modal = document.getElementById('teamModal');
  modal.classList.remove('hidden'); modal.classList.add('flex');
  document.getElementById('teamModalTitle').textContent = teamId ? 'Edit Team' : 'Create Team';
  if (teamId) {
    const data = getData();
    const t = data.teams.find(x => x.id === teamId);
    document.getElementById('teamName').value = t.name;
    document.getElementById('teamDesc').value = t.description;
    document.getElementById('teamColor').value = t.color;
    data.users.forEach(u => {
      const cb = document.getElementById(`teamMember_${u.id}`);
      if (cb) cb.checked = t.memberIds.includes(u.id);
    });
  } else {
    document.getElementById('teamName').value = '';
    document.getElementById('teamDesc').value = '';
    document.getElementById('teamColor').value = '#3b82f6';
    document.querySelectorAll('[id^="teamMember_"]').forEach(cb => cb.checked = false);
  }
}
function closeTeamModal() { document.getElementById('teamModal').classList.add('hidden'); document.getElementById('teamModal').classList.remove('flex'); editingTeamId = null; }
function saveTeam() {
  const data = getData();
  const memberIds = Array.from(document.querySelectorAll('[id^="teamMember_"]:checked')).map(cb => cb.value);
  const team = {
    name: document.getElementById('teamName').value,
    description: document.getElementById('teamDesc').value,
    color: document.getElementById('teamColor').value,
    memberIds,
    canUpdateProjectIds: [],
  };
  if (editingTeamId) {
    const updated = data.teams.map(t => t.id === editingTeamId ? { ...t, ...team } : t);
    saveData({ teams: updated });

function closeBoilerModal() { document.getElementById('boilerModal').classList.add('hidden'); document.getElementById('boilerModal').classList.remove('flex'); editingBoilerId = null; }
function saveBoilerTest() {
  const data = getData();
  const test = {
    testNumber: document.getElementById('btTestNumber').value,
    testDate: document.getElementById('btTestDate').value,
    boilerModel: document.getElementById('btModel').value,
    serialNumber: document.getElementById('btSerial').value,

  };
  if (editingBoilerId) {
    const updated = data.boilerTests.map(t => t.id === editingBoilerId ? { ...t, ...test } : t);

    showToast('Test created!', 'success');
  }
  closeBoilerModal(); render();

function deleteBoilerTest(id) {

function importBoilerTests(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, { type: 'array' });
      const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
      const jsonData = XLSX.utils.sheet_to_json(firstSheet);
      if (jsonData.length > 0) {
        const data = getData();
        const imported = jsonData.map(row => ({
          id: generateId('boiler'),
          testNumber: row['Test Number'] || row['testNumber'] || `BT-${Date.now()}`,
          boilerModel: row['Boiler Model'] || row['boilerModel'] || '',
          serialNumber: row['Serial Number'] || row['serialNumber'] || '',
          manufacturer: row['Manufacturer'] || row['manufacturer'] || '',
          testDate: row['Test Date'] || row['testDate'] || new Date().toISOString().split('T')[0],
          efficiency: parseFloat(row['Efficiency (%)'] || row['efficiency'] || 0),
          maxPressure: parseFloat(row['Max Pressure (bar)'] || row['maxPressure'] || 0),
          operatingPressure: parseFloat(row['Operating Pressure (bar)'] || row['operatingPressure'] || 0),
          steamOutput: parseFloat(row['Steam Output (kg/h)'] || row['steamOutput'] || 0),
          fuelConsumption: parseFloat(row['Fuel Consumption (L/h)'] || row['fuelConsumption'] || 0),
          flueGasTemp: parseFloat(row['Flue Gas Temp'] || row['flueGasTemp'] || 0),
          ambientTemp: parseFloat(row['Ambient Temp'] || row['ambientTemp'] || 0),
          safetyValveTest: String(row['Safety Valve'] || row['safetyValveTest'] || '').toLowerCase() === 'pass',
          waterLevelControl: String(row['Water Level Control'] || row['waterLevelControl'] || '').toLowerCase() === 'pass',
          pressureGaugeTest: String(row['Pressure Gauge'] || row['pressureGaugeTest'] || '').toLowerCase() === 'pass',
          lowWaterCutoff: String(row['Low Water Cutoff'] || row['lowWaterCutoff'] || '').toLowerCase() === 'pass',
          combustionTest: String(row['Combustion Test'] || row['combustionTest'] || '').toLowerCase() === 'pass',
          notes: row['Notes'] || row['notes'] || '',
          createdBy: data.currentUser?.id || '',
          createdAt: new Date().toISOString(),
          attachments: [],
        }));
        saveData({ boilerTests: [...data.boilerTests, ...imported] });
        logActivity(data.currentUser.id, data.currentUser.name, 'import', 'boiler-test', 'batch', `Imported ${imported.length} boiler tests`);
        showToast(`Imported ${imported.length} tests!`, 'success');
        render();
      }
    } catch (err) {
      showToast('Error importing file', 'error');
    }
  };
  reader.readAsArrayBuffer(file);
  input.value = '';
}

let editingPerfId = null;
let charts = {};

function initCharts() {
  const data = getData();
  const performances = data.productPerformances;
  if (!performances.length) return;

  const colors = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899'];

  // Category Pie
  const catData = {};
  performances.forEach(p => { catData[p.category] = (catData[p.category] || 0) + 1; });
  if (document.getElementById('pieCategory')) {
    charts.pieCategory = new Chart(document.getElementById('pieCategory'), {
      type: 'pie',
      data: { labels: Object.keys(catData), datasets: [{ data: Object.values(catData), backgroundColor: colors }] },
      options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 10 } } } } }
    });
  }

  // Efficiency Pie
  if (document.getElementById('pieEfficiency')) {
    charts.pieEfficiency = new Chart(document.getElementById('pieEfficiency'), {
      type: 'pie',
      data: { labels: performances.map(p => p.productName), datasets: [{ data: performances.map(p => p.efficiency), backgroundColor: colors }] },
      options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 10 } } } } }
    });
  }

  // Reliability Pie
  if (document.getElementById('pieReliability')) {
    charts.pieReliability = new Chart(document.getElementById('pieReliability'), {
      type: 'pie',
      data: { labels: performances.map(p => p.productName), datasets: [{ data: performances.map(p => p.reliability), backgroundColor: colors }] },
      options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 10 } } } } }
    });
  }

  // Satisfaction Pie
  if (document.getElementById('pieSatisfaction')) {
    charts.pieSatisfaction = new Chart(document.getElementById('pieSatisfaction'), {
      type: 'pie',
      data: { labels: performances.map(p => p.productName), datasets: [{ data: performances.map(p => p.customerSatisfaction), backgroundColor: colors }] },
      options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 10 } } } } }
    });
  }

  // Cost Pie
  if (document.getElementById('pieCost')) {
    charts.pieCost = new Chart(document.getElementById('pieCost'), {
      type: 'pie',
      data: { labels: performances.map(p => p.productName), datasets: [{ data: performances.map(p => p.costEffectiveness), backgroundColor: colors }] },
      options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 10 } } } } }
    });
  }

  // Overall Pie
  if (document.getElementById('pieOverall')) {
    charts.pieOverall = new Chart(document.getElementById('pieOverall'), {
      type: 'pie',
      data: { labels: performances.map(p => p.productName), datasets: [{ data: performances.map(p => (p.efficiency + p.reliability + p.costEffectiveness + p.customerSatisfaction) / 4), backgroundColor: colors }] },
      options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 10 } } } } }
    });
  }

  // Bar Comparison
  if (document.getElementById('barComparison')) {
    const labels = performances.map(p => p.productName.length > 15 ? p.productName.substring(0, 15) + '...' : p.productName);
    charts.barComparison = new Chart(document.getElementById('barComparison'), {
      type: 'bar',
      data: {
        labels,
        datasets: [
          { label: 'Efficiency', data: performances.map(p => p.efficiency), backgroundColor: '#3b82f6' },
          { label: 'Reliability', data: performances.map(p => p.reliability), backgroundColor: '#10b981' },
          { label: 'Cost Effect.', data: performances.map(p => p.costEffectiveness), backgroundColor: '#f59e0b' },
          { label: 'Satisfaction', data: performances.map(p => p.customerSatisfaction), backgroundColor: '#8b5cf6' },
        ]
      },
      options: { responsive: true, scales: { y: { beginAtZero: true, max: 100 } }, plugins: { legend: { position: 'bottom' } } }
    });
  }

  // Line Trend
  if (document.getElementById('lineTrend')) {
    const labels = performances.map(p => p.productName.length > 15 ? p.productName.substring(0, 15) + '...' : p.productName);
    charts.lineTrend = new Chart(document.getElementById('lineTrend'), {
      type: 'line',
      data: {
        labels,
        datasets: [
          { label: 'Efficiency', data: performances.map(p => p.efficiency), borderColor: '#3b82f6', tension: 0.3 },
          { label: 'Reliability', data: performances.map(p => p.reliability), borderColor: '#10b981', tension: 0.3 },
          { label: 'Cost Effect.', data: performances.map(p => p.costEffectiveness), borderColor: '#f59e0b', tension: 0.3 },
          { label: 'Satisfaction', data: performances.map(p => p.customerSatisfaction), borderColor: '#8b5cf6', tension: 0.3 },
        ]
      },
      options: { responsive: true, scales: { y: { beginAtZero: true, max: 100 } }, plugins: { legend: { position: 'bottom' } } }
    });
  }
}

function openPerfModal(id = null) {
  editingPerfId = id;
  const modal = document.getElementById('perfModal');
  modal.classList.remove('hidden'); modal.classList.add('flex');
  document.getElementById('perfModalTitle').textContent = id ? 'Edit Product' : 'Add Product Performance';
  if (id) {
    const data = getData();
    const p = data.productPerformances.find(x => x.id === id);
    document.getElementById('perfName').value = p.productName;
    document.getElementById('perfCategory').value = p.category;
    document.getElementById('perfEfficiency').value = p.efficiency;
    document.getElementById('perfReliability').value = p.reliability;
    document.getElementById('perfCost').value = p.costEffectiveness;
    document.getElementById('perfSatisfaction').value = p.customerSatisfaction;
    document.getElementById('perfDate').value = p.testDate;
    document.getElementById('perfNotes').value = p.notes;
  } else {
    ['perfName','perfCategory','perfEfficiency','perfReliability','perfCost','perfSatisfaction','perfDate','perfNotes'].forEach(id => document.getElementById(id).value = '');
  }
}
function closePerfModal() { document.getElementById('perfModal').classList.add('hidden'); document.getElementById('perfModal').classList.remove('flex'); editingPerfId = null; }
function savePerf() {
  const data = getData();
  const perf = {
    productName: document.getElementById('perfName').value,
    category: document.getElementById('perfCategory').value,
    efficiency: parseFloat(document.getElementById('perfEfficiency').value) || 0,
    reliability: parseFloat(document.getElementById('perfReliability').value) || 0,
    costEffectiveness: parseFloat(document.getElementById('perfCost').value) || 0,
    customerSatisfaction: parseFloat(document.getElementById('perfSatisfaction').value) || 0,
    testDate: document.getElementById('perfDate').value,
    notes: document.getElementById('perfNotes').value,
  };
  if (editingPerfId) {
    const updated = data.productPerformances.map(p => p.id === editingPerfId ? { ...p, ...perf } : p);
    saveData({ productPerformances: updated });
    logActivity(data.currentUser.id, data.currentUser.name, 'update', 'performance', editingPerfId, `Updated: ${perf.productName}`);
    showToast('Product updated!', 'success');
  } else {
    const newPerf = { id: generateId('perf'), ...perf };
    saveData({ productPerformances: [...data.productPerformances, newPerf] });
    logActivity(data.currentUser.id, data.currentUser.name, 'create', 'performance', newPerf.id, `Added: ${perf.productName}`);
    showToast('Product added!', 'success');
  }
  closePerfModal(); render();
}
function editPerf(id) { openPerfModal(id); }
function deletePerf(id) {
  const data = getData();
  const p = data.productPerformances.find(x => x.id === id);
  if (!confirm(`Delete "${p.productName}"?`)) return;
  const updated = data.productPerformances.filter(x => x.id !== id);
  saveData({ productPerformances: updated });
  logActivity(data.currentUser.id, data.currentUser.name, 'delete', 'performance', id, `Deleted: ${p.productName}`);
  showToast('Product deleted', 'success'); render();
}
function exportPerfPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const data = getData();
  doc.setFontSize(18); doc.text('Product Performance Report', 14, 20);
  const tableData = data.productPerformances.map(p => [p.productName, p.category, p.efficiency + '%', p.reliability + '%', p.costEffectiveness + '%', p.customerSatisfaction + '%', p.testDate]);
  doc.autoTable({ head: [['Product', 'Category', 'Efficiency', 'Reliability', 'Cost Effect.', 'Satisfaction', 'Date']], body: tableData, startY: 30, styles: { fontSize: 9 }, headStyles: { fillColor: [37, 99, 235] } });
  doc.save('product-performance.pdf');
  showToast('PDF exported!', 'success');
}

    document.getElementById('designImpact').value = c.impact;
  } else {
    document.getElementById('designProject').selectedIndex = 0;
    document.getElementById('designTitle').value = '';
    document.getElementById('designDesc').value = '';
    document.getElementById('designType').value = 'design';

function closeDesignModal() { document.getElementById('designModal').classList.add('hidden'); document.getElementById('designModal').classList.remove('flex'); editingDesignId = null; }
function saveDesignChange() {
  const data = getData();
  const project = data.projects.find(p => p.id === document.getElementById('designProject').value);
  const change = {
    projectId: document.getElementById('designProject').value,
    projectName: project?.name || 'Unknown',
    title: document.getElementById('designTitle').value,
    description: document.getElementById('designDesc').value,
    changeType: document.getElementById('designType').value,
    impact: document.getElementById('designImpact').value,
  };
  if (editingDesignId) {
    const updated = data.designChanges.map(c => c.id === editingDesignId ? { ...c, ...change, updatedAt: new Date().toISOString() } : c);
    saveData({ designChanges: updated });
    logActivity(data.currentUser.id, data.currentUser.name, 'update', 'design-change', editingDesignId, `Updated: ${change.title}`);
    showToast('Change updated!', 'success');
  } else {
    const newChange = { id: generateId('design'), ...change, status: 'proposed', requestedBy: data.currentUser.id, requestedByName: data.currentUser.name, approvedBy: null, approvedByName: null, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() };
    saveData({ designChanges: [...data.designChanges, newChange] });
    logActivity(data.currentUser.id, data.currentUser.name, 'create', 'design-change', newChange.id, `Created: ${change.title}`);
    showToast('Change created!', 'success');
  }
  closeDesignModal(); render();
}

function deleteDesignChange(id) {
  const data = getData();

function renderBoms() {
  const data = getData();
  const boms = data.boms || [];
  const changes = data.designChanges || [];
  const projects = data.projects || [];
  const currentUser = data.currentUser;
  const isAdmin = currentUser?.role === 'admin' || currentUser?.role === 'manager' || currentUser?.role === 'rd-manager';
  const isProcurement = currentUser?.role === 'procurement' || currentUser?.role === 'finance';
  const isEngineer = currentUser?.role === 'engineer' || currentUser?.role === 'design-engineer' || currentUser?.role === 'fabrication-engineer';
  const canCreate = isAdmin || isEngineer;
  const canApprove = isAdmin || isProcurement;

  const projectFilter = window.bomProjectFilter || 'all';
  const statusFilter = window.bomStatusFilter || 'all';
  const search = window.bomSearch || '';

  const filtered = boms.filter(bom => {
    const matchesProject = projectFilter === 'all' || bom.projectId === projectFilter;
    const matchesStatus = statusFilter === 'all' || bom.status === statusFilter;
    const matchesSearch = !search || bom.projectName.toLowerCase().includes(search.toLowerCase()) || bom.items.some(i => i.description.toLowerCase().includes(search.toLowerCase()) || i.partNumber.toLowerCase().includes(search.toLowerCase()));
    return matchesProject && matchesStatus && matchesSearch;
  });

  const selectedBomId = window.bomSelectedId || (filtered[0]?.id || '');
  const selectedBom = boms.find(b => b.id === selectedBomId);

  const approvedDesigns = changes.filter(c => c.status === 'approved');
  const projectOptions = projects.map(p => `<option value="${p.id}">${escapeHtml(p.name)}</option>`).join('');
  const designOptions = approvedDesigns.length ? approvedDesigns.map(c => `<option value="${c.id}">${escapeHtml(c.title)} (${c.projectName})</option>`).join('') : '<option value="">No approved designs</option>';

  const statusColors = { draft: 'bg-slate-100 text-slate-600', submitted: 'bg-blue-100 text-blue-700', approved: 'bg-green-100 text-green-700', rejected: 'bg-red-100 text-red-700' };

  return `

        <div class="bg-white rounded-xl border border-slate-200 p-5"><p class="text-xs text-slate-400">BOMs</p><p class="text-2xl font-bold">${boms.length}</p></div>
        <div class="bg-white rounded-xl border border-slate-200 p-5"><p class="text-xs text-slate-400">Approved</p><p class="text-2xl font-bold">${boms.filter(b => b.status === 'approved').length}</p></div>
        <div class="bg-white rounded-xl border border-slate-200 p-5"><p class="text-xs text-slate-400">Draft</p><p class="text-2xl font-bold">${boms.filter(b => b.status === 'draft').length}</p></div>
        <div class="bg-white rounded-xl border border-slate-200 p-5"><p class="text-xs text-slate-400">Total Items</p><p class="text-2xl font-bold">${boms.reduce((s, b) => s + (b.items?.length || 0), 0)}</p></div>
        <div class="bg-white rounded-xl border border-slate-200 p-5"><p class="text-xs text-slate-400">Total Value</p><p class="text-2xl font-bold">${boms.reduce((s, b) => s + (b.totalCost || 0), 0).toLocaleString()}</p></div>
      </div>

      <!-- Filters & Create -->
      <div class="flex flex-col md:flex-row gap-3 items-start md:items-center justify-between">
        <div class="flex flex-col sm:flex-row gap-2">
          <select onchange="window.bomProjectFilter = this.value; render();" class="px-3 py-2 border border-slate-200 rounded-lg text-sm bg-white">
            <option value="all">All Projects</option>
            ${projects.map(p => `<option value="${p.id}" ${projectFilter === p.id ? 'selected' : ''}>${escapeHtml(p.name)}</option>`).join('')}
          </select>
          <select onchange="window.bomStatusFilter = this.value; render();" class="px-3 py-2 border border-slate-200 rounded-lg text-sm bg-white">
            <option value="all">All Status</option>
            <option value="draft" ${statusFilter === 'draft' ? 'selected' : ''}>Draft</option>
            <option value="submitted" ${statusFilter === 'submitted' ? 'selected' : ''}>Submitted</option>
            <option value="approved" ${statusFilter === 'approved' ? 'selected' : ''}>Approved</option>
            <option value="rejected" ${statusFilter === 'rejected' ? 'selected' : ''}>Rejected</option>
          </select>
          <div class="relative">
            <i class="fa-solid fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xs"></i>
            <input type="text" placeholder="Search BOM..." value="${search}" oninput="window.bomSearch = this.value; render();" class="pl-8 pr-3 py-2 border border-slate-200 rounded-lg text-sm w-48">

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <!-- BOM List -->
        <div class="lg:col-span-1 space-y-3">
          ${filtered.length === 0 ? renderEmptyState('No BOMs found.') : filtered.map(bom => `
            <div onclick="window.bomSelectedId = '${bom.id}'; render();" class="cursor-pointer bg-white rounded-xl border ${selectedBomId === bom.id ? 'border-blue-500 ring-1 ring-blue-500' : 'border-slate-200'} p-4 hover:shadow-sm transition-all">
              <div class="flex items-start justify-between mb-2">
                <h3 class="text-sm font-semibold text-slate-900 truncate">${escapeHtml(bom.projectName)}</h3>
                <span class="text-[10px] px-2 py-0.5 rounded-full font-medium ${statusColors[bom.status] || 'bg-slate-100'}">${bom.status}</span>
              </div>
              <p class="text-xs text-slate-500 mb-1">${bom.items?.length || 0} items · ${(bom.totalCost || 0).toLocaleString()} total</p>
              <p class="text-[10px] text-slate-400">Ver ${bom.version || '1.0'} · ${bom.createdByName || '—'}</p>

        </div>

        <!-- BOM Detail -->
        <div class="lg:col-span-2">
          ${!selectedBom ? renderEmptyState('Select a BOM from the list to view details.') : `
            <div class="bg-white rounded-xl border border-slate-200 shadow-sm">
              <!-- BOM Header -->
              <div class="p-6 border-b border-slate-200">
                <div class="flex items-start justify-between mb-4">
                  <div>
                    <h2 class="text-lg font-semibold text-slate-900">${escapeHtml(selectedBom.projectName)}</h2>

              <!-- Items Table -->
              <div class="p-6">

                  <h3 class="text-sm font-semibold text-slate-700">Items (${selectedBom.items?.length || 0})</h3>
                  ${canCreate ? `<button onclick="openBomItemModal('${selectedBom.id}')" class="px-3 py-1.5 text-xs bg-blue-50 text-blue-600 rounded-lg hover:bg-blue-100"><i class="fa-solid fa-plus mr-1"></i>Add Item</button>` : ''}
                </div>
                <div class="overflow-x-auto">
                  <table class="w-full text-sm">
                    <thead class="bg-slate-50 text-xs text-slate-500 uppercase">
                      <tr>

                        <th class="px-3 py-2 text-right font-medium">Qty</th>
                        <th class="px-3 py-2 text-left font-medium">Unit</th>
                        <th class="px-3 py-2 text-left font-medium">Material</th>

                        <th class="px-3 py-2 text-right font-medium">Unit Cost</th>
                        <th class="px-3 py-2 text-right font-medium">Total</th>
                        <th class="px-3 py-2 text-center font-medium">Action</th>
                      </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100">
                      ${(selectedBom.items || []).map((item, idx) => `
                        <tr class="hover:bg-slate-50">
                          <td class="px-3 py-2.5 text-slate-500">${item.lineNumber || idx + 1}</td>
                          <td class="px-3 py-2.5 font-medium text-slate-700">${escapeHtml(item.partNumber)}</td>
                          <td class="px-3 py-2.5 text-slate-600">${escapeHtml(item.description)}</td>
                          <td class="px-3 py-2.5 text-right font-medium">${item.quantity}</td>
                          <td class="px-3 py-2.5 text-slate-500">${escapeHtml(item.unit)}</td>
                          <td class="px-3 py-2.5 text-slate-500">${escapeHtml(item.material)}</td>
                          <td class="px-3 py-2.5 text-slate-500">${escapeHtml(item.supplier)}</td>
                          <td class="px-3 py-2.5 text-right">${item.unitCost?.toLocaleString() || '0'}</td>
                          <td class="px-3 py-2.5 text-right font-medium text-slate-700">${item.totalCost?.toLocaleString() || '0'}</td>
                          <td class="px-3 py-2.5 text-center">
                            ${canCreate ? `<div class="flex items-center justify-center gap-1">
                              <button onclick="openBomItemModal('${selectedBom.id}', '${item.id}')" class="p-1 text-slate-400 hover:text-blue-500"><i class="fa-solid fa-pencil text-xs"></i></button>
                              <button onclick="deleteBomItem('${selectedBom.id}', '${item.id}')" class="p-1 text-slate-400 hover:text-red-500"><i class="fa-solid fa-trash text-xs"></i></button>
                            </div>` : '—'}
                          </td>
                        </tr>
                      `).join('')}
                      <tr class="bg-slate-50 font-semibold">
                        <td class="px-3 py-2.5 text-right" colspan="8">Total</td>
                        <td class="px-3 py-2.5 text-right text-green-600">${(selectedBom.totalCost || 0).toLocaleString()}</td>
                        <td></td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          `}
        </div>
      </div>

      <!-- BOM Modal -->
      <div id="bomModal" class="modal-overlay fixed inset-0 z-50 bg-black/50 hidden items-center justify-center p-4">
        <div class="modal-content bg-white rounded-xl shadow-xl max-w-lg w-full p-6">
          <div class="flex items-center justify-between mb-4">
            <h2 id="bomModalTitle" class="text-xl font-bold text-slate-900">New BOM</h2>
            <button onclick="closeBomModal()" class="p-1.5 rounded-lg hover:bg-slate-100 text-slate-400"><i class="fa-solid fa-xmark"></i></button>
          </div>
          <div class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">Project</label>
              <select id="bomProject" class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">${projectOptions}</select>
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">Linked Approved Design (optional)</label>
              <select id="bomDesign" class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">${designOptions}</select>
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">Version</label>
              <input type="text" id="bomVersion" class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" value="1.0">
            </div>
          </div>
          <div class="flex justify-end gap-2 mt-6">
            <button onclick="closeBomModal()" class="px-4 py-2 border border-slate-200 rounded-lg text-sm font-medium text-slate-700 hover:bg-slate-50">Cancel</button>
            <button onclick="saveBom()" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">Save</button>
          </div>
        </div>
      </div>

      <!-- BOM Item Modal -->
      <div id="bomItemModal" class="modal-overlay fixed inset-0 z-50 bg-black/50 hidden items-center justify-center p-4">
        <div class="modal-content bg-white rounded-xl shadow-xl max-w-lg w-full p-6">
          <div class="flex items-center justify-between mb-4">
            <h2 id="bomItemModalTitle" class="text-xl font-bold text-slate-900">Add BOM Item</h2>
            <button onclick="closeBomItemModal()" class="p-1.5 rounded-lg hover:bg-slate-100 text-slate-400"><i class="fa-solid fa-xmark"></i></button>
          </div>
          <div class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
              <div><label class="block text-sm font-medium text-slate-700 mb-1">Line #</label><input type="number" id="bomItemLine" class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></div>
              <div><label class="block text-sm font-medium text-slate-700 mb-1">Part Number</label><input type="text" id="bomItemPart" class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></div>
            </div>
            <div><label class="block text-sm font-medium text-slate-700 mb-1">Description</label><input type="text" id="bomItemDesc" class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></div>
            <div class="grid grid-cols-2 gap-4">
              <div><label class="block text-sm font-medium text-slate-700 mb-1">Quantity</label><input type="number" id="bomItemQty" class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" min="0" step="0.01"></div>
              <div><label class="block text-sm font-medium text-slate-700 mb-1">Unit</label><input type="text" id="bomItemUnit" class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="pcs, m, kg, sq.m"></div>
            </div>
            <div class="grid grid-cols-2 gap-4">
              <div><label class="block text-sm font-medium text-slate-700 mb-1">Material</label><input type="text" id="bomItemMaterial" class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></div>
              <div><label class="block text-sm font-medium text-slate-700 mb-1">Supplier</label><input type="text" id="bomItemSupplier" class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></div>
            </div>
            <div class="grid grid-cols-2 gap-4">
              <div><label class="block text-sm font-medium text-slate-700 mb-1">Unit Cost</label><input type="number" id="bomItemUnitCost" class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" min="0" step="0.01"></div>
              <div><label class="block text-sm font-medium text-slate-700 mb-1">Notes</label><input type="text" id="bomItemNotes" class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></div>
            </div>
          </div>
          <div class="flex justify-end gap-2 mt-6">
            <button onclick="closeBomItemModal()" class="px-4 py-2 border border-slate-200 rounded-lg text-sm font-medium text-slate-700 hover:bg-slate-50">Cancel</button>
            <button onclick="saveBomItem()" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">Save Item</button>
          </div>
        </div>
      </div>
    </div>
  `;
}

let editingBomId = null;
let editingBomItemId = null;
let editingBomItemBomId = null;

function openBomModal(id = null) {
  editingBomId = id;
  const modal = document.getElementById('bomModal');
  modal.classList.remove('hidden'); modal.classList.add('flex');
  document.getElementById('bomModalTitle').textContent = id ? 'Edit BOM' : 'New BOM';
  if (id) {
    const data = getData();
    const b = data.boms.find(x => x.id === id);
    if (b) {
      document.getElementById('bomProject').value = b.projectId;
      document.getElementById('bomDesign').value = b.designChangeId || '';
      document.getElementById('bomVersion').value = b.version || '1.0';
    }
  } else {
    document.getElementById('bomProject').selectedIndex = 0;
    document.getElementById('bomDesign').value = '';
    document.getElementById('bomVersion').value = '1.0';
  }
}
function closeBomModal() { document.getElementById('bomModal').classList.add('hidden'); document.getElementById('bomModal').classList.remove('flex'); editingBomId = null; }
function saveBom() {
  const data = getData();
  const project = data.projects.find(p => p.id === document.getElementById('bomProject').value);
  const designId = document.getElementById('bomDesign').value;
  const design = data.designChanges?.find(c => c.id === designId);
  const version = document.getElementById('bomVersion').value || '1.0';

  if (editingBomId) {
    const updated = data.boms.map(b => b.id === editingBomId ? {
      ...b,
      projectId: project.id,
      projectName: project.name,
      designChangeId: designId || '',
      designChangeTitle: design?.title || 'Approved Design',
      version
    } : b);
    saveData({ boms: updated });
    logActivity(data.currentUser.id, data.currentUser.name, 'update', 'bom', editingBomId, `Updated BOM for ${project.name}`);
    showToast('BOM updated', 'success');
  } else {
    const newBom = {
      id: generateId('bom'),
      projectId: project.id,
      projectName: project.name,
      designChangeId: designId || '',
      designChangeTitle: design?.title || 'Approved Design',
      status: 'draft',
      version,
      items: [],
      totalCost: 0,
      createdBy: data.currentUser.id,
      createdByName: data.currentUser.name,
      createdAt: new Date().toISOString(),
      approvedBy: null,
      approvedByName: null,
      approvedAt: null
    };
    saveData({ boms: [...data.boms, newBom] });
    window.bomSelectedId = newBom.id;
    logActivity(data.currentUser.id, data.currentUser.name, 'create', 'bom', newBom.id, `Created BOM for ${project.name}`);
    showToast('BOM created', 'success');
  }
  closeBomModal(); render();
}
function deleteBom(id) {
  const data = getData();
  const b = data.boms.find(x => x.id === id);
  if (!confirm(`Delete BOM for "${b.projectName}"?`)) return;
  const updated = data.boms.filter(x => x.id !== id);
  saveData({ boms: updated });
  if (window.bomSelectedId === id) window.bomSelectedId = null;
  logActivity(data.currentUser.id, data.currentUser.name, 'delete', 'bom', id, `Deleted BOM: ${b.projectName}`);
  showToast('BOM deleted', 'success'); render();
}
function submitBom(id) {
  const data = getData();
  const updated = data.boms.map(b => b.id === id ? { ...b, status: 'submitted' } : b);
  saveData({ boms: updated });
  logActivity(data.currentUser.id, data.currentUser.name, 'submit', 'bom', id, 'Submitted BOM for approval');
  showToast('BOM submitted for approval', 'success'); render();
}
function approveBom(id) {
  const data = getData();
  const updated = data.boms.map(b => b.id === id ? {
    ...b,
    status: 'approved',
    approvedBy: data.currentUser.id,
    approvedByName: data.currentUser.name,
    approvedAt: new Date().toISOString()
  } : b);
  saveData({ boms: updated });
  logActivity(data.currentUser.id, data.currentUser.name, 'approve', 'bom', id, 'Approved BOM');
  showToast('BOM approved', 'success'); render();
}
function rejectBom(id) {
  const data = getData();
  const updated = data.boms.map(b => b.id === id ? { ...b, status: 'rejected' } : b);
  saveData({ boms: updated });
  logActivity(data.currentUser.id, data.currentUser.name, 'reject', 'bom', id, 'Rejected BOM');
  showToast('BOM rejected', 'error'); render();
}

function openBomItemModal(bomId, itemId = null) {
  editingBomItemBomId = bomId;
  editingBomItemId = itemId;
  const modal = document.getElementById('bomItemModal');
  modal.classList.remove('hidden'); modal.classList.add('flex');
  document.getElementById('bomItemModalTitle').textContent = itemId ? 'Edit BOM Item' : 'Add BOM Item';
  const data = getData();
  const bom = data.boms.find(b => b.id === bomId);
  const nextLine = (bom.items?.length || 0) + 1;
  if (itemId) {
    const item = bom.items.find(i => i.id === itemId);
    document.getElementById('bomItemLine').value = item.lineNumber || '';
    document.getElementById('bomItemPart').value = item.partNumber || '';
    document.getElementById('bomItemDesc').value = item.description || '';
    document.getElementById('bomItemQty').value = item.quantity || '';
    document.getElementById('bomItemUnit').value = item.unit || '';
    document.getElementById('bomItemMaterial').value = item.material || '';
    document.getElementById('bomItemSupplier').value = item.supplier || '';
    document.getElementById('bomItemUnitCost').value = item.unitCost || '';
    document.getElementById('bomItemNotes').value = item.notes || '';
  } else {
    document.getElementById('bomItemLine').value = nextLine;
    document.getElementById('bomItemPart').value = '';
    document.getElementById('bomItemDesc').value = '';
    document.getElementById('bomItemQty').value = '';
    document.getElementById('bomItemUnit').value = '';
    document.getElementById('bomItemMaterial').value = '';
    document.getElementById('bomItemSupplier').value = '';
    document.getElementById('bomItemUnitCost').value = '';
    document.getElementById('bomItemNotes').value = '';
  }
}
function closeBomItemModal() { document.getElementById('bomItemModal').classList.add('hidden'); document.getElementById('bomItemModal').classList.remove('flex'); editingBomItemId = null; editingBomItemBomId = null; }
function saveBomItem() {
  const data = getData();
  const bom = data.boms.find(b => b.id === editingBomItemBomId);
  if (!bom) { closeBomItemModal(); return; }
  const qty = Number(document.getElementById('bomItemQty').value || 0);
  const unitCost = Number(document.getElementById('bomItemUnitCost').value || 0);
  const totalCost = qty * unitCost;
  const item = {
    id: editingBomItemId || generateId('bom-item'),
    lineNumber: Number(document.getElementById('bomItemLine').value || 0),
    partNumber: document.getElementById('bomItemPart').value || '',
    description: document.getElementById('bomItemDesc').value || '',
    quantity: qty,
    unit: document.getElementById('bomItemUnit').value || 'pcs',
    material: document.getElementById('bomItemMaterial').value || '',
    supplier: document.getElementById('bomItemSupplier').value || '',
    unitCost: unitCost,
    totalCost: totalCost,
    notes: document.getElementById('bomItemNotes').value || ''
  };
  let newItems;
  if (editingBomItemId) {
    newItems = bom.items.map(i => i.id === editingBomItemId ? item : i);
  } else {
    newItems = [...bom.items, item];
  }
  const newTotal = newItems.reduce((s, i) => s + (i.totalCost || 0), 0);
  const updatedBoms = data.boms.map(b => b.id === editingBomItemBomId ? { ...b, items: newItems, totalCost: newTotal } : b);
  saveData({ boms: updatedBoms });
  logActivity(data.currentUser.id, data.currentUser.name, editingBomItemId ? 'update' : 'create', 'bom-item', item.id, `${editingBomItemId ? 'Updated' : 'Added'} BOM item: ${item.description}`);
  showToast(editingBomItemId ? 'Item updated' : 'Item added', 'success');
  closeBomItemModal(); render();
}
function deleteBomItem(bomId, itemId) {
  const data = getData();
  const bom = data.boms.find(b => b.id === bomId);
  const item = bom.items.find(i => i.id === itemId);
  if (!confirm(`Delete item "${item.description}"?`)) return;
  const newItems = bom.items.filter(i => i.id !== itemId);
  const newTotal = newItems.reduce((s, i) => s + (i.totalCost || 0), 0);
  const updatedBoms = data.boms.map(b => b.id === bomId ? { ...b, items: newItems, totalCost: newTotal } : b);
  saveData({ boms: updatedBoms });
  logActivity(data.currentUser.id, data.currentUser.name, 'delete', 'bom-item', itemId, `Deleted BOM item: ${item.description}`);
  showToast('Item deleted', 'success'); render();
}
function exportBOM(bomId) {
  const data = getData();
  const bom = data.boms.find(b => b.id === bomId);
  if (!bom) return;
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF('l', 'mm', 'a4');
  doc.setFontSize(16); doc.text('Bill of Materials', 14, 20);
  doc.setFontSize(10); doc.text(`Project: ${bom.projectName}`, 14, 28);
  doc.text(`Design: ${bom.designChangeTitle || 'Approved Design'}`, 14, 33);
  doc.text(`Version: ${bom.version || '1.0'}`, 14, 38);
  doc.text(`Status: ${bom.status}`, 14, 43);
  doc.text(`Created: ${bom.createdByName || '—'} | ${new Date(bom.createdAt).toLocaleDateString()}`, 14, 48);
  if (bom.approvedByName) doc.text(`Approved: ${bom.approvedByName} | ${new Date(bom.approvedAt).toLocaleDateString()}`, 14, 53);
  const tableData = (bom.items || []).map(i => [
    i.lineNumber || '', i.partNumber || '', i.description || '', i.quantity || '', i.unit || '', i.material || '', i.supplier || '', i.unitCost?.toLocaleString() || '', i.totalCost?.toLocaleString() || ''
  ]);
  tableData.push(['', '', '', '', '', '', '', 'Total', (bom.totalCost || 0).toLocaleString()]);
  doc.autoTable({
    head: [['Line #', 'Part Number', 'Description', 'Qty', 'Unit', 'Material', 'Supplier', 'Unit Cost', 'Total Cost']],
    body: tableData,
    startY: 58,
    styles: { fontSize: 8, cellPadding: 2 },
    headStyles: { fillColor: [37, 99, 235], textColor: 255 },
    columnStyles: { 0: { cellWidth: 12 }, 3: { halign: 'right' }, 7: { halign: 'right' }, 8: { halign: 'right' } }
  });
  doc.save(`bom-${bom.projectName.replace(/\s+/g, '-').toLowerCase()}.pdf`);
  showToast('BOM PDF exported', 'success');
}

</script>
